<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="card">
  <div class="card-header">
    <input type="text" class="card-search" placeholder="Search City...">
    <button>Search</button>
  </div>
  <div class="card-body">
    <h2 class="temp">5°C</h2>
    <span class="city">city</span>
    <span class="condition">clear sky ☀️</span>

  </div>

  <div class="card-footer">
    <div class="humidity">
        56% Humidity
    </div>
    
    <div class="wind">62.3 km/hr</div>
  </div>

</div>
</div>
<script src="./script.js"></script>
</body>
</html>
